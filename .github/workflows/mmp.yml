name: Compilar Kernel Lineage 21
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Dependencias
        run: |
          sudo apt-get update
          # Ya no forzamos python2 con ln -s, instalamos la herramienta de conversión
          sudo apt-get install -y build-essential bc libncurses5-dev libssl-dev bison flex libelf-dev gcc-aarch64-linux-gnu python3 python-is-python3 2to3

      - name: Clonar Kernel
        run: |
          git clone --depth=1 -b lineage-21 https://github.com/gta7lite/android_kernel_samsung_mt6765.git mmp

      - name: Traducir Script de MediaTek (Fix SyntaxError)
        run: |
          cd mmp
          # Esta línea lee todos los archivos de MediaTek y les pone los paréntesis a los 'print'
          2to3 -w tools/dct/DrvGen.py
          # Si hay más archivos python sueltos, esto los convierte también
          find tools -name "*.py" -exec 2to3 -w {} +

      - name: Parchear Conflictos de Red (skbuff)
        run: |
          cd mmp
          sed -i 's/static inline unsigned int skb_frag_size/static inline __attribute__((unused)) unsigned int skb_frag_size/g' include/linux/skbuff.h
          sed -i 's/static inline void skb_frag_size_set/static inline __attribute__((unused)) void skb_frag_size_set/g' include/linux/skbuff.h

      - name: Configurar y Compilar OP
        run: |
          cd mmp
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          make gta7lite_defconfig
          
          # Tus flags inyectadas
          cat <<EOF >> .config
          CONFIG_CFG80211=y
          CONFIG_MAC80211=y
          CONFIG_BT_HCIBTUSB=y
          CONFIG_NAMESPACES=y
          CONFIG_USER_NS=y
          CONFIG_MTK_FTRACE=n
          EOF
          
          make olddefconfig
          make -j$(nproc)

      - name: Subir Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-A7Lite-OP-Fix2to3
          path: mmp/arch/arm64/boot/Image.gz
          

name: Compilar Kernel Lineage 21
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Dependencias y Fix Python
        run: |
          sudo apt-get update
          # Este es el parche para el error 127 que viste en el log
          sudo apt-get install -y build-essential bc libncurses5-dev libssl-dev bison flex libelf-dev gcc-aarch64-linux-gnu python-is-python3

      - name: Clonar Kernel
        run: |
          git clone --depth=1 -b lineage-21 https://github.com/gta7lite/android_kernel_samsung_mt6765.git mmp

      - name: Parchear Conflictos skbuff
        run: |
          cd mmp
          # Seguimos usando el parche de red para evitar el "conflicting types"
          sed -i 's/static inline unsigned int skb_frag_size/static inline __attribute__((unused)) unsigned int skb_frag_size/g' include/linux/skbuff.h
          sed -i 's/static inline void skb_frag_size_set/static inline __attribute__((unused)) void skb_frag_size_set/g' include/linux/skbuff.h

      - name: Configurar y Compilar OP
        run: |
          cd mmp
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          make gta7lite_defconfig
          
          # Tus funciones de Terminal OP (Linux, Monitor, BT)
          cat <<EOF >> .config
          CONFIG_CFG80211=y
          CONFIG_MAC80211=y
          CONFIG_BT_HCIBTUSB=y
          CONFIG_NAMESPACES=y
          CONFIG_USER_NS=y
          CONFIG_MTK_FTRACE=n
          EOF
          
          make olddefconfig
          make -j$(nproc)

      - name: Subir Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-A7Lite-OP-Final
          path: mmp/arch/arm64/boot/Image.gz
          

name: Compilar Kernel Lineage 21 - Fix Shebang Final
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparar Entorno
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc libncurses5-dev libssl-dev bison flex libelf-dev gcc-aarch64-linux-gnu python3 2to3
          # Enlace simbólico para compatibilidad
          sudo ln -sf /usr/bin/python3 /usr/bin/python2

      - name: Clonar Kernel
        run: |
          git clone --depth=1 -b lineage-21 https://github.com/gta7lite/android_kernel_samsung_mt6765.git mmp

      - name: Reparar Scripts de MediaTek (Fix Definitivo)
        run: |
          cd mmp
          # 1. Convertimos el código a Python 3
          2to3 -w tools/dct/DrvGen.py || true
          
          # 2. REPARACIÓN QUIRÚRGICA:
          # Primero forzamos el encabezado de Python 3 en la línea 1
          sed -i '1s|.*|#!/usr/bin/python3|' tools/dct/DrvGen.py
          # Luego insertamos la función 'cmp' en la línea 2 para no romper el encabezado
          sed -i '2i def cmp(a, b): return (a > b) - (a < b)' tools/dct/DrvGen.py
          
          # 3. Aplicamos permisos de ejecución
          chmod +x tools/dct/DrvGen.py
          
          # 4. Convertimos el resto de herramientas
          find tools -name "*.py" -exec 2to3 -w {} + || true

      - name: Parchear Red (skbuff)
        run: |
          cd mmp
          sed -i 's/static inline unsigned int skb_frag_size/static inline __attribute__((unused)) unsigned int skb_frag_size/g' include/linux/skbuff.h
          sed -i 's/static inline void skb_frag_size_set/static inline __attribute__((unused)) void skb_frag_size_set/g' include/linux/skbuff.h

      - name: Configurar y Compilar
        run: |
          cd mmp
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export DTC_EXT=dtc
          
          mkdir -p out
          
          # Configuración base
          make O=out gta7lite_defconfig
          
          # Inyectar módulos para Terminal (Monitor Mode, etc)
          cat <<EOF >> out/.config
          CONFIG_CFG80211=y
          CONFIG_MAC80211=y
          CONFIG_BT_HCIBTUSB=y
          CONFIG_NAMESPACES=y
          CONFIG_USER_NS=y
          CONFIG_MTK_FTRACE=n
          EOF
          
          make O=out olddefconfig
          # Compilación final
          make -j$(nproc --all) O=out ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- DTC_EXT=dtc CONFIG_NO_ERROR_ON_MISMATCH=y

      - name: Subir Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-A7Lite-Final-Fixed-V2
          path: mmp/out/arch/arm64/boot/Image.gz
          

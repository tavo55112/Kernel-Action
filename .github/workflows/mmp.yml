name: Compilar Kernel OP
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Herramientas
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc libncurses5-dev libssl-dev bison flex libelf-dev gcc-aarch64-linux-gnu

      - name: Descargar Kernel (Rama Main)
        run: |
          # Clonamos la rama 'main' que es la que aparece en tu captura
          git clone --depth=1 -b main https://github.com/DevZillion/android_kernel_samsung_gta7litewifixx.git mmp

      - name: Configurar y Compilar
        run: |
          cd mmp
          # Habilitamos lo necesario para Monitor y Linux
          scripts/config --file arch/arm64/configs/gta7lite_eur_open_defconfig --enable CONFIG_CFG80211
          scripts/config --file arch/arm64/configs/gta7lite_eur_open_defconfig --enable CONFIG_NAMESPACES
          
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make gta7lite_eur_open_defconfig
          make -j$(nproc)
          

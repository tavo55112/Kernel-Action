name: Compilar Kernel Lineage 21 - Fix Definitivo
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparar Entorno (El Engaño de Python)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc libncurses5-dev libssl-dev bison flex libelf-dev gcc-aarch64-linux-gnu python3 2to3
          # CREAMOS EL COMANDO python2 PARA QUE EL SISTEMA NO SE DETENGA
          sudo ln -sf /usr/bin/python3 /usr/bin/python2

      - name: Clonar Kernel
        run: |
          git clone --depth=1 -b lineage-21 https://github.com/gta7lite/android_kernel_samsung_mt6765.git mmp

      - name: Modernizar Scripts de MediaTek
        run: |
          cd mmp
          # Convertimos el código viejo de MediaTek a Python 3 automáticamente
          2to3 -w tools/dct/DrvGen.py || true
          find tools -name "*.py" -exec 2to3 -w {} + || true

      - name: Parchear Red (skbuff)
        run: |
          cd mmp
          sed -i 's/static inline unsigned int skb_frag_size/static inline __attribute__((unused)) unsigned int skb_frag_size/g' include/linux/skbuff.h
          sed -i 's/static inline void skb_frag_size_set/static inline __attribute__((unused)) void skb_frag_size_set/g' include/linux/skbuff.h

      - name: Configurar y Compilar OP
        run: |
          cd mmp
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export DTC_EXT=dtc
          
          mkdir -p out
          
          # Configuración para la Tab A7 Lite
          make O=out gta7lite_defconfig
          
          # Inyectar tus herramientas (Monitor, Namespaces, etc.)
          cat <<EOF >> out/.config
          CONFIG_CFG80211=y
          CONFIG_MAC80211=y
          CONFIG_BT_HCIBTUSB=y
          CONFIG_NAMESPACES=y
          CONFIG_USER_NS=y
          CONFIG_MTK_FTRACE=n
          EOF
          
          make O=out olddefconfig
          # Compilación real
          make -j$(nproc --all) O=out ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- DTC_EXT=dtc CONFIG_NO_ERROR_ON_MISMATCH=y

      - name: Subir Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-A7Lite-Final-Attempt
          path: mmp/out/arch/arm64/boot/Image.gz
          

name: Compilar Kernel OP
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Herramientas
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc libncurses5-dev libssl-dev bison flex libelf-dev gcc-aarch64-linux-gnu

      - name: Descargar Kernel
        run: |
          git clone --depth=1 -b main https://github.com/DevZillion/android_kernel_samsung_gta7litewifixx.git mmp

      - name: Inyectar Modificaciones
        run: |
          cd mmp
          # Forzamos la configuración de Modo Monitor y Linux al final del archivo
          echo "CONFIG_CFG80211=y" >> arch/arm64/configs/gta7lite_eur_open_defconfig
          echo "CONFIG_MAC80211=y" >> arch/arm64/configs/gta7lite_eur_open_defconfig
          echo "CONFIG_NAMESPACES=y" >> arch/arm64/configs/gta7lite_eur_open_defconfig
          echo "CONFIG_USER_NS=y" >> arch/arm64/configs/gta7lite_eur_open_defconfig

      - name: Compilar
        run: |
          cd mmp
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make gta7lite_eur_open_defconfig
          make -j$(nproc)
          

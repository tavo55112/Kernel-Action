name: Compilar Kernel Lineage 21
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc libncurses5-dev libssl-dev bison flex libelf-dev gcc-aarch64-linux-gnu

      - name: Clonar Kernel
        run: |
          git clone --depth=1 -b lineage-21 https://github.com/gta7lite/android_kernel_samsung_mt6765.git mmp

      - name: Configurar y Compilar
        run: |
          cd mmp
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # Buscamos el archivo de configuración real para no adivinar el nombre
          CONF_FILE=$(find arch/arm64/configs/ -name "*gta7lite*" | head -n 1 | xargs basename)
          echo "Usando configuración: $CONF_FILE"
          
          make $CONF_FILE
          
          # Inyectamos tus modificaciones de Modo Monitor y Linux
          echo "CONFIG_CFG80211=y" >> .config
          echo "CONFIG_MAC80211=y" >> .config
          echo "CONFIG_NAMESPACES=y" >> .config
          echo "CONFIG_USER_NS=y" >> .config
          
          # Compilación final
          make -j$(nproc)

      - name: Subir Resultado
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Final-A7
          path: mmp/arch/arm64/boot/Image.gz
          

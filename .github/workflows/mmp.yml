name: Mmp
on:
  workflow_dispatch:

jobs:
  ci-test:
    name: ci-mmp
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Mmp CI
      uses: ./
      with:
          kernel-url: https://github.com/DevZillion/android_kernel_samsung_gta7litewifixx
          kernel-dir: mmp
          kernel-branch: master
          config: gta7lite_eur_open_defconfig
          arch: arm64
          aosp-gcc: true
          aosp-clang: true
          android-version: 12
          aosp-clang-version: r416183b
          lxc: true
          lxc-patch: true
          nethunter: true
          nethunter-patch: true
          bbrplus: true
          anykernel3: true

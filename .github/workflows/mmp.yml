name: Compilar Kernel Lineage 21
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Herramientas
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc libncurses5-dev libssl-dev bison flex libelf-dev gcc-aarch64-linux-gnu

      - name: Clonar Kernel
        run: |
          git clone --depth=1 -b lineage-21 https://github.com/gta7lite/android_kernel_samsung_mt6765.git mmp

      - name: Configurar y Parchear OP
        run: |
          cd mmp
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # Encontrar el defconfig correcto automáticamente
          CONF_FILE=$(find arch/arm64/configs/ -name "*gta7lite*" | head -n 1 | xargs basename)
          make $CONF_FILE
          
          # --- INYECCIÓN DE SOPORTE ---
          # Modo Monitor
          echo "CONFIG_CFG80211=y" >> .config
          echo "CONFIG_MAC80211=y" >> .config
          # Bluetooth (hciconfig)
          echo "CONFIG_BT_HCIBTUSB=y" >> .config
          # Soporte Linux (Namespaces)
          echo "CONFIG_NAMESPACES=y" >> .config
          echo "CONFIG_USER_NS=y" >> .config
          # Fix para evitar Exit Code 2 en MediaTek
          echo "CONFIG_MTK_FTRACE=n" >> .config

      - name: Compilar
        run: |
          cd mmp
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make -j$(nproc)

      - name: Subir Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-A7Lite-Completo
          path: mmp/arch/arm64/boot/Image.gz
          

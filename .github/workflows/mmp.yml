name: Compilar Kernel Lineage 21
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc libncurses5-dev libssl-dev bison flex libelf-dev gcc-aarch64-linux-gnu

      - name: Clonar Kernel (Rama Lineage-21)
        run: |
          # Usamos el link y la rama que encontraste
          git clone --depth=1 -b lineage-21 https://github.com/gta7lite/android_kernel_samsung_mt6765.git mmp

      - name: Configurar y Parchear OP
        run: |
          cd mmp
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gta7lite_defconfig
          
          # Inyectamos Modo Monitor, Soporte Linux y BT
          echo "CONFIG_CFG80211=y" >> .config
          echo "CONFIG_MAC80211=y" >> .config
          echo "CONFIG_BT_HCIBTUSB=y" >> .config
          echo "CONFIG_NAMESPACES=y" >> .config
          echo "CONFIG_USER_NS=y" >> .config

      - name: Compilar
        run: |
          cd mmp
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make -j$(nproc)

      - name: Subir Kernel Compilado
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-A7-Lite-OP
          path: mmp/arch/arm64/boot/Image.gz
          
